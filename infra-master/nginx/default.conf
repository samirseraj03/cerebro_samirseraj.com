# Rutas de dirección para cada proyecto
# Proxy inverso Nginx para enrutar tráfico a los contenedores Docker

# Frontend - Servidor por defecto y samirseraj.com
server {
    listen 80 default_server;
    server_name samirseraj.com localhost;

    location / {
        proxy_pass http://web-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Django Backend
server {
    listen 80;
    server_name api.samirseraj.com api.localhost;

    location / {
        proxy_pass http://django-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# FastAPI (puerto correcto: 8000, no 8080)
